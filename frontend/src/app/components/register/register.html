<div class="auth-wrap">
  <div class="auth-card">
    <h1>Create account</h1>
    <p class="sub">Join and start exploring destinations</p>

    <div class="error-banner" *ngIf="error">{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <!-- username -->
      <div class="field">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          placeholder="username"
          autocomplete="username"
        />
        <span class="err-msg" *ngIf="username.invalid && username.touched"> </span>
      </div>

      <!-- email -->
      <div class="field">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="email"
          autocomplete="email"
        />
        <span class="err-msg" *ngIf="email.invalid && email.touched"> </span>
      </div>

      <!-- password -->
      <div class="field">
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input
            id="password"
            [type]="showPass ? 'text' : 'password'"
            formControlName="password"
            placeholder="password"
            autocomplete="new-password"
          />
          <button type="button" class="toggle-btn" (click)="showPass = !showPass">
            {{ showPass ? 'Hide' : 'Show' }}
          </button>
        </div>
        <span class="err-msg" *ngIf="password.invalid && password.touched"> </span>
      </div>

      <!-- confirm password -->
      <div class="field">
        <label for="confirm">Confirm password</label>
        <input
          id="confirm"
          type="password"
          formControlName="confirmPassword"
          placeholder="repeat your password"
          autocomplete="new-password"
        />
        <span class="err-msg" *ngIf="form.errors?.['mismatch'] && confirmPassword.touched">
          Passwords do not match
        </span>
      </div>

      <button type="submit" class="btn" [disabled]="form.invalid || loading">
        {{ loading ? 'Creating account...' : 'Create account' }}
      </button>
    </form>

    <p class="footer">Already have an account? <a routerLink="/login">Sign in</a></p>
  </div>
</div>
