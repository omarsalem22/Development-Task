spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/travel
    username: ${DB_USERNAME:postgres}          
    password: ${DB_PASSWORD:123456789}  #>> get user name , password from env or get defualts       
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # update development or 'none' for production
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
