spring:
  datasource:
    # URL will come from environment variable (Docker Compose)
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:123456789}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: true
    # Remove the dialect line (Hibernate auto-detects it now)
    # properties:
    #   hibernate:
    #     dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret-key: ${JWT_SECRET_KEY:CFlrMMoGpaR8qKtYTLvrHoRRhO583ZZwhrbr4gB7Bds=}
  expiration-time: ${JWT_EXPIRATION_TIME:36000000}